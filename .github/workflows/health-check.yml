name: Site Health Check

on:
  schedule:
    # 毎日 JST 8:00 (UTC 23:00 前日) と JST 20:00 (UTC 11:00)
    - cron: '0 23 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      notify_on_success:
        description: '全サイト正常でも通知する'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
      GH_TOKEN: ${{ secrets.OPS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Run health checks
        id: check
        run: |
          TOTAL=0
          OK=0
          FAIL=0
          FAILURES=""
          REPORT_TABLE="| 状態 | サイト名 | HTTP |\n|------|---------|------|\n"

          while IFS= read -r site; do
            name=$(echo "$site" | jq -r '.name')
            url=$(echo "$site" | jq -r '.url')
            TOTAL=$((TOTAL + 1))

            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url" 2>/dev/null || echo "000")

            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              REPORT_TABLE="${REPORT_TABLE}| ✅ | ${name} | ${status} |\n"
              OK=$((OK + 1))
            else
              REPORT_TABLE="${REPORT_TABLE}| ❌ | ${name} | ${status} |\n"
              FAIL=$((FAIL + 1))
              FAILURES="${FAILURES}- ❌ **${name}** → HTTP ${status}\n"
            fi
          done < <(jq -c '.sites[]' sites.json)

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "ok=$OK" >> $GITHUB_OUTPUT
          echo "fail=$FAIL" >> $GITHUB_OUTPUT

          {
            echo 'report_table<<EOF'
            echo -e "$REPORT_TABLE"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

          if [ $FAIL -gt 0 ]; then
            echo "has_failures=true" >> $GITHUB_OUTPUT
            {
              echo 'failures<<EOF'
              echo -e "$FAILURES"
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
          fi

      - name: Check auto-update workflow status
        id: update_check
        run: |
          UPDATE_ISSUES=""

          while IFS= read -r site; do
            name=$(echo "$site" | jq -r '.name')
            repo=$(echo "$site" | jq -r '.repo')
            auto=$(echo "$site" | jq -r '.auto_update')

            if [ "$auto" = "true" ]; then
              last_run=$(gh api "repos/${repo}/actions/workflows/update.yml/runs?per_page=1&status=completed" \
                --jq '.workflow_runs[0] | "\(.conclusion) \(.updated_at)"' 2>/dev/null || echo "unknown")

              conclusion=$(echo "$last_run" | awk '{print $1}')
              run_date=$(echo "$last_run" | awk '{print $2}')

              if [ "$conclusion" != "success" ]; then
                UPDATE_ISSUES="${UPDATE_ISSUES}- ⚠️ **${name}**: 最終更新 \`${conclusion}\` (${run_date})\n"
              fi
            fi
          done < <(jq -c '.sites[]' sites.json)

          if [ -n "$UPDATE_ISSUES" ]; then
            echo "has_update_issues=true" >> $GITHUB_OUTPUT
            {
              echo 'update_issues<<EOF'
              echo -e "$UPDATE_ISSUES"
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "has_update_issues=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update dashboard
        run: python scripts/build_dashboard.py

      - name: Commit dashboard
        run: |
          git config user.name "site-ops[bot]"
          git config user.email "site-ops[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "update dashboard $(date '+%Y-%m-%d %H:%M')"
          git push

      - name: Create/update issue on failure
        if: steps.check.outputs.has_failures == 'true' || steps.update_check.outputs.has_update_issues == 'true'
        run: |
          TITLE="🚨 Site-Ops Alert: ${{ steps.check.outputs.fail }}件エラー $(date '+%m/%d %H:%M')"
          BODY=$(cat <<'BODYEOF'
          ## 🚨 ヘルスチェック結果

          **${{ steps.check.outputs.ok }} / ${{ steps.check.outputs.total }}** サイト正常

          ### エラー検出
          ${{ steps.check.outputs.failures }}

          ${{ steps.update_check.outputs.update_issues }}

          ### 全サイト一覧
          ${{ steps.check.outputs.report_table }}

          ---
          📊 [ダッシュボード](https://jpn-x.github.io/site-ops/) | 🔧 [修正実行](https://github.com/jpn-x/site-ops/actions/workflows/auto-fix.yml) | 🚀 [更新トリガー](https://github.com/jpn-x/site-ops/actions/workflows/trigger-update.yml)
          BODYEOF
          )

          # 既存の未解決alertがあれば閉じて新規作成
          existing=$(gh issue list --label "alert" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing" ]; then
            gh issue close "$existing" --comment "新しいチェック結果で置き換え" 2>/dev/null || true
          fi

          gh issue create --title "$TITLE" --body "$BODY" --label "alert"

      - name: Close alert issues if all OK
        if: steps.check.outputs.has_failures == 'false' && steps.update_check.outputs.has_update_issues == 'false'
        run: |
          existing=$(gh issue list --label "alert" --state open --json number --jq '.[].number' 2>/dev/null || echo "")
          for num in $existing; do
            gh issue close "$num" --comment "✅ 全サイト正常確認 $(date '+%Y-%m-%d %H:%M JST')" 2>/dev/null || true
          done

      - name: Success notification issue (if requested)
        if: |
          steps.check.outputs.has_failures == 'false' &&
          steps.update_check.outputs.has_update_issues == 'false' &&
          github.event.inputs.notify_on_success == 'true'
        run: |
          gh issue create \
            --title "✅ 全サイト正常 $(date '+%m/%d %H:%M')" \
            --body "全 ${{ steps.check.outputs.total }} サイト正常稼働中 🎉\n\n📊 [ダッシュボード](https://jpn-x.github.io/site-ops/)" \
            --label "report"
